spring.application.name=agent
server.port=8080

# ============================================================================
# Supabase PostgreSQL 数据库配置
# ============================================================================
# 使用事务池连接 (Transaction pooler) — 端口 6543，prepareThreshold=0 禁用 PREPARE 语句
spring.datasource.url=jdbc:postgresql://aws-0-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0&socketTimeout=20&connectTimeout=10
spring.datasource.username=postgres.lgfngvjedjnygdulisbc
spring.datasource.password=eS!LvmeaR7C3zih

# 连接池配置
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# JPA 配置 — validate 模式不会自动修改表结构（表已在 Supabase 中创建）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# 使用标准命名策略，保持表名/列名与 Supabase 完全一致
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
